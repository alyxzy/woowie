<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thai Consonant Drill</title>

<style>
body {
  font-family: Arial;
  background: #f9fafb;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.start-screen {
  text-align: center;
}

.letter {
  font-size: 100px;
  text-align: center;
  color: red;
}

.options button {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 10px;
}

.hearts {
  font-size: 25px;
}

.correct {
  background: #dcfce7;
}

.wrong {
  background: #fee2e2;
}
</style>
</head>

<body>

<div class="container">

<!-- START SCREEN -->
<div class="card start-screen" id="start-screen">
  <h1>CSII Team X presents</h1>
  <h2>Thai Consonants</h2>

  <input id="nickname" type="text" placeholder="Enter nickname">
  <br><br>

  <button onclick="startQuiz()">Start Quiz</button>
  <p id="error-message"></p>
</div>

<!-- QUIZ -->
<div id="quiz-area" style="display:none">

<h3 id="user-display"></h3>

<div class="card">
  <div>Score: <span id="score">0</span></div>
  <div>Lives: <span id="hearts">❤️❤️❤️</span></div>
  <div>Remaining: <span id="remaining">0</span></div>
</div>

<div class="card">

<h2>Identify this consonant</h2>

<div class="letter" id="thai-letter"></div>

<div class="options" id="options"></div>

<p id="feedback"></p>

</div>

</div>

</div>

<script>

const BACKEND_URL = "https://wow-xpky-service.onrender.com"

const allConsonants = [
{thai:"ก",name:"ko kai"},
{thai:"ข",name:"kho khai"},
{thai:"ค",name:"kho khwai"},
{thai:"ง",name:"ngo ngu"},
{thai:"จ",name:"cho chan"},
{thai:"ช",name:"cho chang"},
{thai:"ด",name:"do dek"},
{thai:"ต",name:"to tao"},
{thai:"บ",name:"bo baimai"},
{thai:"ป",name:"po pla"}
]

let remaining=[]
let score=0
let lives=3
let current=null
let nickname=""
let starts=0

function shuffle(a){
 return [...a].sort(()=>Math.random()-0.5)
}

function updateHearts(){
 let h=""
 for(let i=0;i<3;i++){
  h+= i<lives ? "❤️":"🩶"
 }
 document.getElementById("hearts").textContent=h
}

function updateScore(){
 document.getElementById("score").textContent=score
}

function updateRemaining(){
 document.getElementById("remaining").textContent=remaining.length
}

function showQuestion(){

 if(remaining.length===0){
  document.getElementById("thai-letter").textContent="✓"
  document.getElementById("feedback").textContent="You finished all!"
  return
 }

 let correct = remaining[Math.floor(Math.random()*remaining.length)]

 current=correct

 document.getElementById("thai-letter").textContent=correct.thai

 let wrong = shuffle(allConsonants.filter(c=>c.thai!==correct.thai)).slice(0,3)

 let options = shuffle([correct,...wrong])

 let div=document.getElementById("options")

 div.innerHTML=""

 options.forEach(o=>{
  let b=document.createElement("button")
  b.textContent=o.name
  b.onclick=()=>answer(o,b)
  div.appendChild(b)
 })
}

function answer(o,b){

 if(o.thai===current.thai){

  score++
  updateScore()

  remaining=remaining.filter(c=>c.thai!==current.thai)

  b.classList.add("correct")

 }else{

  lives--
  updateHearts()

  b.classList.add("wrong")

  if(lives<=0){
   document.getElementById("feedback").textContent="Game Over"
   return
  }
 }

 updateRemaining()

 setTimeout(showQuestion,800)

}

function resetGame(){

 remaining=[...allConsonants]
 score=0
 lives=3

 updateScore()
 updateHearts()
 updateRemaining()

 showQuestion()

}

function startQuiz(){

 nickname=document.getElementById("nickname").value

 if(!nickname){
  document.getElementById("error-message").textContent="Enter nickname"
  return
 }

 document.getElementById("user-display").textContent =
 nickname + " — Starts: 1"

 document.getElementById("start-screen").style.display="none"
 document.getElementById("quiz-area").style.display="block"

 resetGame()

}
}

</script>

</body>
</html>
